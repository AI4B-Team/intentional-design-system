<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta -->
    <title>RealElite - Real Estate Investment Platform</title>
    <meta name="description" content="Manage properties, analyze deals, track offers, and close faster with RealElite Command Center" />
    <meta name="author" content="RealElite" />
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RealElite" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="RealElite" />
    <meta name="format-detection" content="telephone=yes" />
    
    <!-- iOS splash screens -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="RealElite - Real Estate Investment Platform" />
    <meta property="og:description" content="Manage properties, analyze deals, track offers, and close faster" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@RealElite" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Safe area insets for notched devices -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
